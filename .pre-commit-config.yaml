repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0, see "Tags" in previous link  # pragma: allowlist secret
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^\.vscode/.*\.json$
      - id: detect-private-key

  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # v1.5.0, see "Tags" in previous link  # pragma: allowlist secret
    hooks:
      - id: detect-secrets

  - repo: local
    hooks:
      - id: audit-check
        name: audit-check
        entry: make audit-check
        language: system
        pass_filenames: false

      - id: mypy-check
        name: mypy-check
        entry: make mypy-check
        language: system
        pass_filenames: false

      - id: uv-check
        name: uv-check
        entry: make uv-check
        language: system
        pass_filenames: false

      - id: ruff-check
        name: ruff-check
        entry: make ruff-check
        language: system
        pass_filenames: false
